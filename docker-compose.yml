# =============================================================================
# TrendAI Demo Platform — top-level orchestration
#
#   docker compose up -d --build
#
# Only the portal is published on the host (8088). Every demo is reached
# THROUGH the portal, which reverse-proxies it behind the login:
#
#   http://<host>:8088/          login gate (default admin / admin)
#   http://<host>:8088/v1fs      V1 File Security Scanner   (auth required)
#   http://<host>:8088/appsec    AI Guard & File Security   (auth required)
#   http://<host>:8088/smish     Smish Detector             (auth required)
#   http://<host>:8088/siemcalc  Agentic SIEM Calculator    (auth required)
#   http://<host>:8088/workload  Server & Workload Protection (auth required)
#   http://<host>:8088/aiscanner AI Scanner                   (auth required)
#   http://<host>:8088/v1chat    Vision One Chatbot            (auth required)
#
# The demo containers are NOT published on the host — they are only reachable
# on the internal compose network via the authenticated portal.
# =============================================================================

name: trendai-demo

services:
  # --- The branded login portal + demo hub + reverse proxy ----------------
  portal:
    build:
      context: ./portal
    container_name: trendai-portal
    ports:
      - "8088:3000"
    environment:
      PORTAL_PORT: "3000"
      PORTAL_DATA_DIR: /data
    volumes:
      - portal_data:/data
    depends_on:
      - v1fs-scanner
      - app-sec
      - smish
      - siem-calc
      - workload-protection
      - ai-scanner
      - v1-chatbot
    restart: unless-stopped

  # --- V1 File Security Scanner (Go) — internal only ----------------------
  v1fs-scanner:
    build:
      context: ./tools/v1fs-manual-scan
    container_name: trendai-v1fs-scanner
    volumes:
      - v1fs_data:/data
    restart: unless-stopped

  # --- AI Guard & File Security (FastAPI chatbot) — internal only ----------
  app-sec:
    build:
      context: ./tools/app-sec-file-sec
      target: app
    container_name: trendai-app-sec
    environment:
      EXT_PORT: "8000"
      # Pre-point the chatbot at the bundled Ollama container so the demo works
      # out of the box (the presenter still enters the Vision One API keys).
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma2:2b}
    depends_on:
      - ollama
    restart: unless-stopped

  # --- Ollama LLM (CPU) — internal only -----------------------------------
  # Shared by the AI Guard chatbot (OLLAMA_MODEL) and the AI Scanner tool,
  # which needs several models spanning ~1B-4B parameters to choose from
  # (OLLAMA_EXTRA_MODELS). Pulled once into the ollama_data volume. Keep-alive
  # is kept modest (10m) since this host has limited free RAM (~3GB) shared
  # across several containers plus a real endpoint agent — a short idle
  # unload avoids multiple models piling up resident at once. AI Scanner
  # additionally requests its own short keep_alive per call.
  ollama:
    image: ollama/ollama:latest
    container_name: trendai-ollama
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma2:2b}
      OLLAMA_EXTRA_MODELS: "${OLLAMA_EXTRA_MODELS:-llama3.2:1b phi3:mini}"
      OLLAMA_KEEP_ALIVE: "10m"
    entrypoint:
      - /bin/sh
      - -c
      - |
        ollama serve &
        until ollama list >/dev/null 2>&1; do sleep 1; done
        echo "Pulling $${OLLAMA_MODEL}…"
        ollama pull "$${OLLAMA_MODEL}" || true
        for m in $${OLLAMA_EXTRA_MODELS}; do
          echo "Pulling $$m…"
          ollama pull "$$m" || true
        done
        wait
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # --- Agentic SIEM Sizing Calculator (nginx SPA) — internal only ---------
  siem-calc:
    build:
      context: ./tools/siem-calculator
    container_name: trendai-siem-calc
    restart: unless-stopped

  # --- Server & Workload Protection (FastAPI) — internal only -------------
  # /opt/workload-demo is bind-mounted (not a named volume) so it's a
  # predictable host path you can add directly to a real Deep Security /
  # Vision One agent's Integrity Monitoring and Log Inspection rules, to
  # make those two modules register real events too — see
  # tools/workload-protection/README-REAL-DETECTION.md.
  workload-protection:
    build:
      context: ./tools/workload-protection
    container_name: trendai-workload-protection
    volumes:
      - /opt/workload-demo:/data
    restart: unless-stopped

  # --- AI Scanner (FastAPI) — internal only -------------------------------
  # Original adversarial-testing engine against local Ollama models —
  # see tools/ai-scanner/app.py for the full design rationale.
  ai-scanner:
    build:
      context: ./tools/ai-scanner
    container_name: trendai-ai-scanner
    depends_on:
      - ollama
    restart: unless-stopped

  # --- Vision One Chatbot (FastAPI + the real trendai-vision-one-mcp-server
  # Go binary, built from source at image-build time) — internal only -------
  v1-chatbot:
    build:
      context: ./tools/v1-chatbot
    container_name: trendai-v1-chatbot
    depends_on:
      - ollama
    restart: unless-stopped

  # --- Smish Detector (Flask, HTTPS/self-signed) — internal only ----------
  smish:
    build:
      context: ./tools/sms-dl
    container_name: trendai-smish
    environment:
      REPORT_PASSWORD: sms
    volumes:
      - smish_data:/app/static
      - smish_ssl:/app/ssl
    restart: unless-stopped

volumes:
  portal_data:
  v1fs_data:
  smish_data:
  smish_ssl:
  ollama_data:
