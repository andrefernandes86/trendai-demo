<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Set a new password · TrendAI Tools</title>
  <link rel="icon" href="/logo.svg" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="auth-wrap">
    <form class="auth-card" id="changeForm" autocomplete="off">
      <div class="brand">
        <img src="/logo.svg" width="40" height="40" alt="" />
        <div>
          <div class="name">Trend<span class="ai">AI</span> Tools</div>
          <div class="tag">Account security</div>
        </div>
      </div>
      <h1>Set a new password</h1>
      <p class="sub">For security, the default password must be changed before you continue.</p>

      <label for="current">Current password</label>
      <input type="password" id="current" placeholder="••••••••" autocomplete="current-password" />

      <label for="newpw">New password</label>
      <input type="password" id="newpw" placeholder="At least 8 characters" autocomplete="new-password" />

      <label for="confirm">Confirm new password</label>
      <input type="password" id="confirm" placeholder="Re-enter new password" autocomplete="new-password" />

      <button class="btn" type="submit" id="submitBtn">Update password &amp; continue</button>
      <div class="msg" id="msg"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById('changeForm');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.className = 'msg';
      msg.textContent = '';
      const current = document.getElementById('current').value;
      const newpw = document.getElementById('newpw').value;
      const confirm = document.getElementById('confirm').value;

      if (newpw.length < 8) {
        msg.className = 'msg error';
        msg.textContent = 'New password must be at least 8 characters.';
        return;
      }
      if (newpw !== confirm) {
        msg.className = 'msg error';
        msg.textContent = 'New password and confirmation do not match.';
        return;
      }

      btn.disabled = true;
      try {
        const res = await fetch('/api/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ currentPassword: current, newPassword: newpw }),
        });
        const data = await res.json();
        if (!res.ok) {
          msg.className = 'msg error';
          msg.textContent = data.error || 'Could not update password.';
          btn.disabled = false;
          return;
        }
        msg.className = 'msg ok';
        msg.textContent = 'Password updated. Redirecting…';
        setTimeout(() => (window.location.href = '/'), 800);
      } catch (err) {
        msg.className = 'msg error';
        msg.textContent = 'Network error — please try again.';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
