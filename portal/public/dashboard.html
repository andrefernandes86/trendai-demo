<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TrendAI Tools</title>
  <link rel="icon" href="/logo.svg" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="/logo.svg" width="40" height="40" alt="" />
      <div>
        <div class="name">Trend<span class="ai">AI</span> Tools</div>
        <div class="subtag">Sales enablement &amp; demonstration</div>
      </div>
    </div>
    <div class="right">
      <span class="user" id="user"></span>
      <button class="linkbtn" id="logoutBtn">Sign out</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidenav" id="sidenav"></aside>

    <div class="content">
      <section class="hero">
        <h1 id="catTitle">Demo Tools</h1>
        <p id="catBlurb">Launch any tool below. Each card includes a short script for running it live; it opens on this same site, behind your login.</p>
      </section>
      <main class="grid" id="grid"></main>
    </div>
  </div>

  <footer class="foot">TrendAI Tools · For sales enablement &amp; demonstration use.</footer>

  <script src="/demos.js?v=3"></script>
  <script>
    const CATEGORIES = ['Demo Tools', 'Business Tools', 'Other'];
    const BLURBS = {
      'Demo Tools': 'Live product demos. Each card includes a short script for running it, and opens on this same site behind your login.',
      'Business Tools': 'Internal business and sales utilities.',
      'Other': 'Additional tools and calculators.',
    };

    const ICONS = {
      shield: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>',
      ai: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M12 8V4M8 4h8M9 14h.01M15 14h.01"/></svg>',
      file: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 15l2 2 4-4"/></svg>',
      phone: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="2" width="10" height="20" rx="2"/><path d="M11 18h2"/></svg>',
      calc: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 6h8M8 10h.01M12 10h.01M16 10h.01M8 14h.01M12 14h.01M16 14v4M8 18h4"/></svg>',
    };

    let activeCategory = 'Demo Tools';

    async function guard() {
      try {
        const res = await fetch('/api/session');
        const s = await res.json();
        if (!s.authenticated) { window.location.href = '/login'; return null; }
        if (s.mustChangePassword) { window.location.href = '/change-password'; return null; }
        document.getElementById('user').textContent = 'Signed in as ' + s.username;
        return s;
      } catch (_) {
        window.location.href = '/login';
        return null;
      }
    }

    function demosIn(category) {
      return (window.TRENDAI_DEMOS || []).filter((d) => (d.category || 'Other') === category);
    }

    function buildUrl(demo) {
      // Every tool is proxied by the portal on this same origin, under its path.
      return window.location.origin + demo.path + '/';
    }

    function renderSidenav() {
      const nav = document.getElementById('sidenav');
      nav.innerHTML = '';
      CATEGORIES.forEach((cat) => {
        const count = demosIn(cat).length;
        const btn = document.createElement('button');
        btn.className = 'sidenav-item' + (cat === activeCategory ? ' active' : '');
        btn.innerHTML = `<span>${cat}</span><span class="count">${count}</span>`;
        btn.addEventListener('click', () => { activeCategory = cat; renderSidenav(); renderGrid(); });
        nav.appendChild(btn);
      });
    }

    function renderGrid() {
      const grid = document.getElementById('grid');
      document.getElementById('catTitle').textContent = activeCategory;
      document.getElementById('catBlurb').textContent = BLURBS[activeCategory] || '';
      grid.innerHTML = '';

      const items = demosIn(activeCategory);
      if (!items.length) {
        grid.innerHTML = '<div class="empty-state">No tools in this section yet.</div>';
        return;
      }

      items.forEach((d) => {
        const url = buildUrl(d);
        const stepsHtml = (d.steps || []).map((s) => `<li>${s}</li>`).join('');
        const tagsHtml = (d.tags || []).map((t) => `<span class="tag">${t}</span>`).join('');
        const noteHtml = d.note ? `<p class="desc" style="margin-top:10px;color:var(--warn)">⚠ ${d.note}</p>` : '';
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="icon">${ICONS[d.icon] || ICONS.shield}</div>
          <div class="subtitle">${d.subtitle}</div>
          <h3>${d.title}</h3>
          <p class="desc">${d.desc}</p>
          ${noteHtml}
          <div class="tagrow">${tagsHtml}</div>
          <details class="demo">
            <summary>How to demo</summary>
            <ol>${stepsHtml}</ol>
          </details>
          <div class="actions">
            <a class="open-btn" href="${url}" target="_blank" rel="noopener">Open ↗</a>
          </div>`;
        grid.appendChild(card);
      });
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/login';
    });

    (async () => {
      const s = await guard();
      if (!s) return;
      renderSidenav();
      renderGrid();
    })();
  </script>
</body>
</html>
