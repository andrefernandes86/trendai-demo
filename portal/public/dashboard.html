<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TrendAI Demo Platform</title>
  <link rel="icon" href="/logo.svg" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="/logo.svg" width="40" height="40" alt="" />
      <div>
        <div class="name">Trend<span class="ai">AI</span></div>
        <div class="tag">Demo Platform</div>
      </div>
    </div>
    <div class="right">
      <span class="user" id="user"></span>
      <button class="linkbtn" id="logoutBtn">Sign out</button>
    </div>
  </header>

  <section class="hero">
    <h1>Demo Environments</h1>
    <p>Launch any Trend Vision One demo below. Each card includes a short script for running the demo live. Links open the running demo container on this host.</p>
  </section>

  <div class="banner"><div class="inner" id="hostBanner"></div></div>

  <main class="grid" id="grid"></main>

  <footer class="foot">TrendAI Demo Platform · Trend Vision One · For sales enablement &amp; demonstration use.</footer>

  <script src="/demos.js"></script>
  <script>
    // --- SVG icons -------------------------------------------------------
    const ICONS = {
      shield: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>',
      ai: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M12 8V4M8 4h8M9 14h.01M15 14h.01"/></svg>',
      file: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 15l2 2 4-4"/></svg>',
      phone: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="2" width="10" height="20" rx="2"/><path d="M11 18h2"/></svg>',
    };

    // --- Session guard ---------------------------------------------------
    async function guard() {
      try {
        const res = await fetch('/api/session');
        const s = await res.json();
        if (!s.authenticated) { window.location.href = '/login'; return null; }
        if (s.mustChangePassword) { window.location.href = '/change-password'; return null; }
        document.getElementById('user').textContent = 'Signed in as ' + s.username;
        return s;
      } catch (_) {
        window.location.href = '/login';
        return null;
      }
    }

    function buildUrl(demo) {
      // Every demo is proxied by the portal on this same origin, under its path.
      return window.location.origin + demo.path + '/';
    }

    function render() {
      const grid = document.getElementById('grid');
      document.getElementById('hostBanner').textContent =
        'Each demo opens on this same site (' + window.location.host + ') and stays behind your login.';

      (window.TRENDAI_DEMOS || []).forEach((d) => {
        const url = buildUrl(d);
        const stepsHtml = d.steps.map((s) => `<li>${s}</li>`).join('');
        const tagsHtml = (d.tags || []).map((t) => `<span class="tag">${t}</span>`).join('');
        const noteHtml = d.note ? `<p class="desc" style="margin-top:10px;color:var(--warn)">⚠ ${d.note}</p>` : '';
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="icon">${ICONS[d.icon] || ICONS.shield}</div>
          <div class="subtitle">${d.subtitle}</div>
          <h3>${d.title}</h3>
          <p class="desc">${d.desc}</p>
          ${noteHtml}
          <div class="tagrow">${tagsHtml}</div>
          <details class="demo">
            <summary>How to demo</summary>
            <ol>${stepsHtml}</ol>
          </details>
          <div class="actions">
            <a class="open-btn" href="${url}" target="_blank" rel="noopener">Open demo ↗</a>
            <span class="port">:${d.port}</span>
          </div>`;
        grid.appendChild(card);
      });
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/login';
    });

    (async () => {
      const s = await guard();
      if (s) render();
    })();
  </script>
</body>
</html>
