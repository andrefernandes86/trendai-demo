<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in · TrendAI Demo Platform</title>
  <link rel="icon" href="/logo.svg" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="auth-wrap">
    <form class="auth-card" id="loginForm" autocomplete="off">
      <div class="brand">
        <img src="/logo.svg" width="40" height="40" alt="" />
        <div>
          <div class="name">Trend<span class="ai">AI</span></div>
          <div class="tag">Demo Platform</div>
        </div>
      </div>
      <h1>Sign in</h1>
      <p class="sub">Enter your credentials to access the demo hub.</p>

      <label for="username">Username</label>
      <input type="text" id="username" name="username" value="admin" autocapitalize="off" spellcheck="false" />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" />

      <button class="btn" type="submit" id="submitBtn">Sign in</button>
      <div class="msg" id="msg"></div>

      <div class="hint" id="defaultHint">First time here? Default credentials are <b>admin / admin</b> — you'll be asked to set a new password.</div>
    </form>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.className = 'msg';
      msg.textContent = '';
      btn.disabled = true;
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) {
          msg.className = 'msg error';
          msg.textContent = data.error || 'Login failed.';
          btn.disabled = false;
          return;
        }
        window.location.href = data.mustChangePassword ? '/change-password' : '/';
      } catch (err) {
        msg.className = 'msg error';
        msg.textContent = 'Network error — is the portal reachable?';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
