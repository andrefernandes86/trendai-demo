          [ -z "$SEC_JSON" ] && [ -f scan-artifacts/secrets-scan-results/tmas_scan_report.json ] && SEC_JSON="scan-artifacts/secrets-scan-results/tmas_scan_report.json"
          if [ -n "$SEC_JSON" ]; then append_secrets_details "$SEC_JSON"; else echo "⚠️ No secrets scan data (job failed or no artifact)." >> "$SUM"; echo "" >> "$SUM"; fi

          SBOM_JSON=""
          for d in scan-artifacts/sbom-scan-results scan-artifacts/sbom-scan-results-*; do
            [ -f "$d/tmas_scan_report.json" ] && SBOM_JSON="$d/tmas_scan_report.json" && break
