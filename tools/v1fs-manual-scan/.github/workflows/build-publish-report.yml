          [ -z "$SBOM_JSON" ] && [ -f scan-artifacts/sbom-scan-results/tmas_scan_report.json ] && SBOM_JSON="scan-artifacts/sbom-scan-results/tmas_scan_report.json"
          if [ -n "$SBOM_JSON" ]; then append_sbom_details "$SBOM_JSON"; else echo "⚠️ No SBOM scan data (job failed or no artifact)." >> "$SUM"; echo "" >> "$SUM"; fi

          echo "📥 **Artifacts:** \`vulnerability-scan-results\`, \`malware-scan-results\`, \`secrets-scan-results\`, \`sbom-scan-results\` (full JSON + Markdown)." >> "$SUM"
