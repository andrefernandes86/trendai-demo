<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Secure Platform{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');
        
        :root {
            --cyber-bg: #0a0a0a;
            --cyber-surface: #1a1a1a;
            --cyber-primary: #00ffff;
            --cyber-secondary: #ff00ff;
            --cyber-accent: #ffff00;
            --cyber-danger: #ff0080;
            --cyber-success: #00ff80;
            --cyber-warning: #ff8000;
            --cyber-text: #e0e0e0;
            --cyber-text-dim: #888888;
            --cyber-border: #333333;
            --cyber-glow: 0 0 20px;
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            background: var(--cyber-bg);
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(0, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 0, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(255, 255, 0, 0.05) 0%, transparent 50%);
            min-height: 100vh;
            font-family: 'Rajdhani', 'Segoe UI', sans-serif;
            color: var(--cyber-text);
            overflow-x: hidden;
        }
        
        .navbar {
            background: rgba(26, 26, 26, 0.95) !important;
            backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--cyber-primary);
            box-shadow: 0 4px 20px rgba(0, 255, 255, 0.3);
        }
        
        .navbar-brand {
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            color: var(--cyber-primary) !important;
            text-shadow: var(--cyber-glow) var(--cyber-primary);
            font-size: 1.5rem;
        }
        
        .nav-link {
            color: var(--cyber-text) !important;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        
        .nav-link:hover {
            color: var(--cyber-primary) !important;
            text-shadow: var(--cyber-glow) var(--cyber-primary);
        }
        
        .card {
            background: rgba(26, 26, 26, 0.9);
            backdrop-filter: blur(20px);
            border: 2px solid var(--cyber-border);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        
        .card:hover {
            border-color: var(--cyber-primary);
            box-shadow: 
                0 12px 40px rgba(0, 0, 0, 0.6),
                var(--cyber-glow) var(--cyber-primary);
            transform: translateY(-5px);
        }
        
        .card-header {
            background: rgba(0, 255, 255, 0.1);
            border-bottom: 1px solid var(--cyber-primary);
            color: var(--cyber-primary);
            font-family: 'Orbitron', monospace;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn-primary {
            background: linear-gradient(45deg, var(--cyber-primary), var(--cyber-secondary));
            border: 2px solid var(--cyber-primary);
            border-radius: 8px;
            padding: 12px 30px;
            font-weight: 600;
            font-family: 'Orbitron', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: var(--cyber-glow) var(--cyber-primary);
        }
        
        .btn-primary:hover {
            background: linear-gradient(45deg, var(--cyber-secondary), var(--cyber-primary));
            transform: translateY(-3px);
            box-shadow: 
                var(--cyber-glow) var(--cyber-secondary),
                0 8px 25px rgba(0, 0, 0, 0.4);
        }
        
        .btn-outline-secondary, .btn-outline-info, .btn-outline-warning {
            border: 1px solid var(--cyber-border);
            color: var(--cyber-text);
            background: rgba(26, 26, 26, 0.8);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .btn-outline-secondary:hover {
            background: var(--cyber-primary);
            color: var(--cyber-bg);
            border-color: var(--cyber-primary);
            box-shadow: var(--cyber-glow) var(--cyber-primary);
        }
        
        .btn-outline-info:hover {
            background: var(--cyber-secondary);
            color: var(--cyber-bg);
            border-color: var(--cyber-secondary);
            box-shadow: var(--cyber-glow) var(--cyber-secondary);
        }
        
        .btn-outline-warning:hover {
            background: var(--cyber-warning);
            color: var(--cyber-bg);
            border-color: var(--cyber-warning);
            box-shadow: var(--cyber-glow) var(--cyber-warning);
        }
        
        .status-indicator {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 1000;
        }
        
        .pulse {
            animation: cyberpulse 2s infinite;
        }
        
        @keyframes cyberpulse {
            0% { 
                transform: scale(1);
                box-shadow: var(--cyber-glow) var(--cyber-primary);
            }
            50% { 
                transform: scale(1.05);
                box-shadow: 
                    var(--cyber-glow) var(--cyber-primary),
                    0 0 40px var(--cyber-primary);
            }
            100% { 
                transform: scale(1);
                box-shadow: var(--cyber-glow) var(--cyber-primary);
            }
        }
        
        .cyber-grid {
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .cyber-title {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--cyber-primary);
            text-shadow: 
                var(--cyber-glow) var(--cyber-primary),
                0 0 40px var(--cyber-primary);
        }
        
        .cyber-subtitle {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 300;
            color: var(--cyber-text-dim);
            letter-spacing: 1px;
        }
        
        .alert-info {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid var(--cyber-primary);
            color: var(--cyber-primary);
        }
        
        .alert-success {
            background: rgba(0, 255, 128, 0.1);
            border: 1px solid var(--cyber-success);
            color: var(--cyber-success);
        }
        
        .alert-warning {
            background: rgba(255, 128, 0, 0.1);
            border: 1px solid var(--cyber-warning);
            color: var(--cyber-warning);
        }
        
        .alert-danger {
            background: rgba(255, 0, 128, 0.1);
            border: 1px solid var(--cyber-danger);
            color: var(--cyber-danger);
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--cyber-bg);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--cyber-primary);
            border-radius: 4px;
            box-shadow: var(--cyber-glow) var(--cyber-primary);
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--cyber-secondary);
        }
        
        /* Form styling */
        .form-control:focus {
            background: rgba(26, 26, 26, 0.9) !important;
            border-color: var(--cyber-primary) !important;
            box-shadow: var(--cyber-glow) var(--cyber-primary) !important;
            color: var(--cyber-text) !important;
        }
        
        .input-group-text:focus-within {
            border-color: var(--cyber-primary) !important;
            box-shadow: var(--cyber-glow) var(--cyber-primary) !important;
        }
        
        /* Table styling */
        .table tbody tr {
            border-bottom: 1px solid var(--cyber-border);
        }
        
        .table tbody tr:hover {
            background: rgba(0, 255, 255, 0.05) !important;
        }
        
        /* Modal styling */
        .modal-content {
            background: var(--cyber-surface);
            border: 2px solid var(--cyber-primary);
            box-shadow: var(--cyber-glow) var(--cyber-primary);
        }
        
        .modal-header {
            border-bottom: 1px solid var(--cyber-primary);
        }
        
        .modal-title {
            font-family: 'Orbitron', monospace;
            color: var(--cyber-primary);
            text-transform: uppercase;
        }
        
        /* Badge styling */
        .badge {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Animation for cyber elements */
        .cyber-flicker {
            animation: flicker 2s infinite alternate;
        }
        
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        
        /* Glitch effect for titles */
        .cyber-glitch {
            position: relative;
        }
        
        .cyber-glitch::before,
        .cyber-glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .cyber-glitch::before {
            animation: glitch-1 0.5s infinite;
            color: var(--cyber-secondary);
            z-index: -1;
        }
        
        .cyber-glitch::after {
            animation: glitch-2 0.5s infinite;
            color: var(--cyber-danger);
            z-index: -2;
        }
        
        @keyframes glitch-1 {
            0%, 14%, 15%, 49%, 50%, 99%, 100% {
                transform: translate(0);
            }
            15%, 49% {
                transform: translate(-2px, -1px);
            }
        }
        
        @keyframes glitch-2 {
            0%, 20%, 21%, 62%, 63%, 99%, 100% {
                transform: translate(0);
            }
            21%, 62% {
                transform: translate(2px, 1px);
            }
        }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">
                <i class="fas fa-shield-alt me-2"></i>CYBERPLATFORM
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('index') }}">
                            <i class="fas fa-home me-1"></i>Main
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('report') }}">
                            <i class="fas fa-chart-bar me-1"></i>Report
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    {% if session.authenticated %}
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('logout') }}">
                            <i class="fas fa-sign-out-alt me-1"></i>Logout
                        </a>
                    </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 pt-4">
        {% block content %}{% endblock %}
    </div>

    <div id="status" class="status-indicator"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
