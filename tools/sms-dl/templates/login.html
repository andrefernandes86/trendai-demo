{% extends "base.html" %}

{% block title %}Report Access - CyberPlatform{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-lock fa-3x mb-3" style="color: var(--cyber-primary); text-shadow: var(--cyber-glow) var(--cyber-primary);"></i>
                    <h2 class="card-title cyber-title">REPORT ACCESS</h2>
                    <p class="cyber-subtitle">Enter password to view reports</p>
                </div>
                
                {% if error %}
                <div class="alert alert-danger" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i>{{ error }}
                </div>
                {% endif %}
                
                <form method="POST">
                    <div class="mb-3">
                        <label for="password" class="form-label" style="color: var(--cyber-primary); font-family: 'Orbitron', monospace; text-transform: uppercase;">Password</label>
                        <div class="input-group">
                            <span class="input-group-text" style="background: rgba(0, 255, 255, 0.1); border: 1px solid var(--cyber-primary); color: var(--cyber-primary);">
                                <i class="fas fa-key"></i>
                            </span>
                            <input type="password" class="form-control" id="password" name="password" required 
                                   style="background: rgba(26, 26, 26, 0.9); border: 1px solid var(--cyber-primary); color: var(--cyber-text);">
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-sign-in-alt me-2"></i>Access Reports
                        </button>
                    </div>
                </form>
                
                <div class="text-center mt-3">
                    <a href="{{ url_for('index') }}" class="text-muted">
                        <i class="fas fa-arrow-left me-1"></i>Back to Main
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
